user_mapping:
  description: Maps a user row into the principal shape and marks it as a user.
  model: '"iam_principal"'
  inputs:
    '"iam_users"':
      columns:
        id: TEXT
        roles: TEXT[]
        groups: TEXT[]
      rows:
      - id: user_a
        roles:
        - role_direct
        groups:
        - group_a
    '"iam_groups"':
      columns:
        id: TEXT
        roles: TEXT[]
        groups: TEXT[]
      rows: []
  outputs:
    query:
    - id: user_a
      roles:
      - role_direct
      groups:
      - group_a
      is_user: true

group_mapping:
  description: Maps a group row into the principal shape and marks it as a group.
  model: '"iam_principal"'
  inputs:
    '"iam_users"':
      columns:
        id: TEXT
        roles: TEXT[]
        groups: TEXT[]
      rows: []
    '"iam_groups"':
      columns:
        id: TEXT
        roles: TEXT[]
        groups: TEXT[]
      rows:
      - id: group_a
        roles:
        - role_group
        groups:
        - parent_group
  outputs:
    query:
    - id: group_a
      roles:
      - role_group
      groups:
      - parent_group
      is_user: false

missing_arrays:
  description: Converts missing role and group arrays into empty arrays.
  model: '"iam_principal"'
  inputs:
    '"iam_users"':
      columns:
        id: TEXT
        roles: TEXT[]
        groups: TEXT[]
      rows:
      - id: user_missing
        roles: null
        groups: null
    '"iam_groups"':
      columns:
        id: TEXT
        roles: TEXT[]
        groups: TEXT[]
      rows:
      - id: group_missing
        roles: null
        groups: null
  outputs:
    query:
    - id: group_missing
      roles: []
      groups: []
      is_user: false
    - id: user_missing
      roles: []
      groups: []
      is_user: true

empty_arrays:
  description: Preserves explicit empty arrays from both users and groups.
  model: '"iam_principal"'
  inputs:
    '"iam_users"':
      columns:
        id: TEXT
        roles: TEXT[]
        groups: TEXT[]
      rows:
      - id: user_empty
        roles: []
        groups: []
    '"iam_groups"':
      columns:
        id: TEXT
        roles: TEXT[]
        groups: TEXT[]
      rows:
      - id: group_empty
        roles: []
        groups: []
  outputs:
    query:
    - id: group_empty
      roles: []
      groups: []
      is_user: false
    - id: user_empty
      roles: []
      groups: []
      is_user: true

mixed_population:
  description: Keeps all principals when users and groups are present together.
  model: '"iam_principal"'
  inputs:
    '"iam_users"':
      columns:
        id: TEXT
        roles: TEXT[]
        groups: TEXT[]
      rows:
      - id: user_a
        roles:
        - role_a
        groups:
        - group_a
      - id: user_b
        roles: []
        groups:
        - group_b
    '"iam_groups"':
      columns:
        id: TEXT
        roles: TEXT[]
        groups: TEXT[]
      rows:
      - id: group_a
        roles:
        - role_group_a
        groups: []
      - id: group_b
        roles: []
        groups:
        - parent_group
  outputs:
    query:
    - id: group_a
      roles:
      - role_group_a
      groups: []
      is_user: false
    - id: group_b
      roles: []
      groups:
      - parent_group
      is_user: false
    - id: user_a
      roles:
      - role_a
      groups:
      - group_a
      is_user: true
    - id: user_b
      roles: []
      groups:
      - group_b
      is_user: true

same_id_both_types:
  description: Keeps a user and a group with the same id as separate principal rows.
  model: '"iam_principal"'
  inputs:
    '"iam_users"':
      columns:
        id: TEXT
        roles: TEXT[]
        groups: TEXT[]
      rows:
      - id: shared_id
        roles:
        - user_role
        groups: []
    '"iam_groups"':
      columns:
        id: TEXT
        roles: TEXT[]
        groups: TEXT[]
      rows:
      - id: shared_id
        roles:
        - group_role
        groups:
        - parent_group
  outputs:
    query:
    - id: shared_id
      roles:
      - group_role
      groups:
      - parent_group
      is_user: false
    - id: shared_id
      roles:
      - user_role
      groups: []
      is_user: true

duplicate_rows:
  description: Leaves duplicate user rows visible when they already exist upstream.
  model: '"iam_principal"'
  inputs:
    '"iam_users"':
      columns:
        id: TEXT
        roles: TEXT[]
        groups: TEXT[]
      rows:
      - id: user_dup
        roles:
        - role_a
        groups:
        - group_a
      - id: user_dup
        roles:
        - role_a
        groups:
        - group_a
    '"iam_groups"':
      columns:
        id: TEXT
        roles: TEXT[]
        groups: TEXT[]
      rows: []
  outputs:
    query:
    - id: user_dup
      roles:
      - role_a
      groups:
      - group_a
      is_user: true
    - id: user_dup
      roles:
      - role_a
      groups:
      - group_a
      is_user: true
