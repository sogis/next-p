routes:
  - id: users
    uris:
      - /
      - /*
    plugins:
      openid-connect:
        client_id: apisix
        client_secret: secret
        discovery: http://authz_srv:8080/default/.well-known/openid-configuration
        bearer_only: true
        use_jwks: true
        ssl_verify: false

      serverless-pre-function:
        phase: access
        functions:
        - |
          return function(conf, ctx)
            local core = require("apisix.core")
            local cjson = require("cjson.safe")

            local userinfo = core.request.header(ctx, "X-Userinfo")
            local claims = userinfo and cjson.decode(ngx.decode_base64(userinfo))

            if claims and claims.sub then
              core.request.set_header(ctx, "X-Userinfo-Sub", claims.sub)
            end
          end
          
      authz-casbin:
        model_path: casbin/acl_model.conf
        policy_path: casbin/acl_perm.csv
        username: X-Userinfo-Sub

    upstream:
      type: roundrobin
      nodes:
        "upstream:80": 1

#END