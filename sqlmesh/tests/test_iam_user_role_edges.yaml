direct_user_role:
  description: Returns a user's direct role when the user has no group memberships.
  model: iam_user_role_edges
  inputs:
    iam_principal:
      columns:
        id: TEXT
        roles: TEXT[]
        groups: TEXT[]
        is_user: BOOLEAN
      rows:
      - id: user_direct
        roles:
        - direct_role
        groups: []
        is_user: true
  outputs:
    query:
    - user_id: user_direct
      role_id: direct_role
      cycle_overflow: false
      group_chain: []

