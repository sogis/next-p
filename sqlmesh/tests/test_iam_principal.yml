user_mapping:
  description: Normalizes a raw principal row and preserves the user marker.
  model: iam.principal
  inputs:
    iam.principal_raw:
      columns:
        id: TEXT
        roles_: TEXT[]
        groups_: TEXT[]
        is_user: BOOLEAN
      rows:
      - id: user_a
        roles_:
        - role_1
        - role_2
        groups_:
        - group_1
        - group_2
        is_user: true
  outputs:
    query:
    - id: user_a
      roles:
      - role_1
      - role_2
      groups:
      - group_1
      - group_2
      is_user: true

group_mapping:
  description: Maps a group row into the principal shape and marks it as a group.
  model: iam.principal
  inputs:
    iam.principal_raw:
      columns:
        id: TEXT
        roles_: TEXT[]
        groups_: TEXT[]
        is_user: BOOLEAN
      rows:
      - id: group_a
        roles_:
        - role_1
        - role_2
        groups_:
        - group_1
        - group_2
        is_user: false
  outputs:
    query:
    - id: group_a
      roles:
      - role_1
      - role_2
      groups:
      - group_1
      - group_2
      is_user: false

missing_arrays:
  description: Converts missing role and group arrays into empty arrays.
  model: iam.principal
  inputs:
    iam.principal_raw:
      columns:
        id: TEXT
        roles_: TEXT[]
        groups_: TEXT[]
        is_user: BOOLEAN
      rows:
      - id: user_missing
        roles_: null
        groups_: null
        is_user: true
      - id: group_missing
        roles_: null
        groups_: null
        is_user: false
  outputs:
    query:
    - id: group_missing
      roles: []
      groups: []
      is_user: false
    - id: user_missing
      roles: []
      groups: []
      is_user: true

empty_arrays:
  description: Preserves explicit empty arrays from both users and groups.
  model: iam.principal
  inputs:
    iam.principal_raw:
      columns:
        id: TEXT
        roles_: TEXT[]
        groups_: TEXT[]
        is_user: BOOLEAN
      rows:
      - id: user_empty
        roles_: []
        groups_: []
        is_user: true
      - id: group_empty
        roles_: []
        groups_: []
        is_user: false
  outputs:
    query:
    - id: group_empty
      roles: []
      groups: []
      is_user: false
    - id: user_empty
      roles: []
      groups: []
      is_user: true

mixed_population:
  description: Keeps all principals when users and groups are present together.
  model: iam.principal
  inputs:
    iam.principal_raw:
      columns:
        id: TEXT
        roles_: TEXT[]
        groups_: TEXT[]
        is_user: BOOLEAN
      rows:
      - id: user_a
        roles_:
        - role_a
        groups_:
        - group_a
        is_user: true
      - id: user_b
        roles_: []
        groups_:
        - group_b
        is_user: true
      - id: group_a
        roles_:
        - role_group_a
        groups_: []
        is_user: false
      - id: group_b
        roles_: []
        groups_:
        - parent_group
        is_user: false
  outputs:
    query:
    - id: group_a
      roles:
      - role_group_a
      groups: []
      is_user: false
    - id: group_b
      roles: []
      groups:
      - parent_group
      is_user: false
    - id: user_a
      roles:
      - role_a
      groups:
      - group_a
      is_user: true
    - id: user_b
      roles: []
      groups:
      - group_b
      is_user: true

same_id_both_types:
  description: Keeps a user and a group with the same id as separate principal rows.
  model: iam.principal
  inputs:
    iam.principal_raw:
      columns:
        id: TEXT
        roles_: TEXT[]
        groups_: TEXT[]
        is_user: BOOLEAN
      rows:
      - id: shared_id
        roles_:
        - user_role
        groups_: []
        is_user: true
      - id: shared_id
        roles_:
        - group_role
        groups_:
        - parent_group
        is_user: false
  outputs:
    query:
    - id: shared_id
      roles:
      - group_role
      groups:
      - parent_group
      is_user: false
    - id: shared_id
      roles:
      - user_role
      groups: []
      is_user: true
